<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Calculadora Skills</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
    font-family:'Inter',sans-serif;
    background:radial-gradient(circle at 20% 20%,#1a2735,#05080d 70%);
    color:#e8edf2;
    padding:40px 20px;
}

.wrapper{max-width:1200px;margin:auto}

h1{
    text-align:center;
    font-size:36px;
    margin-bottom:35px;
    background:linear-gradient(90deg,#00e0ff,#6a9cff);
    -webkit-background-clip:text;
    color:transparent;
}

.container{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    background:rgba(18,22,28,0.95);
    border-radius:16px;
    padding:25px;
    box-shadow:0 15px 45px rgba(0,0,0,0.6);
    flex:1 1 400px;
    min-width:360px;
}

.card h2{
    text-align:center;
    margin-bottom:20px;
    color:#8ed8ff;
    font-size:22px;
}

.row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:12px;
}

.field{
    flex:1;
    display:flex;
    flex-direction:column;
}

label{
    font-size:12px;
    color:#9aa7b3;
    margin-bottom:3px;
}

input,select{
    padding:10px;
    border-radius:6px;
    border:1px solid rgba(255,255,255,0.1);
    background:#0e1319;
    color:white;
    font-size:13px;
    text-align:center;
    transition: all 0.2s;
}

input:focus, select:focus{
    outline:none;
    border-color:#00e0ff;
    box-shadow:0 0 8px #00e0ff55;
}

/* slider */

.percentBox{margin-bottom:18px}

.percentLabel{
text-align:center;
font-size:12px;
color:#9aa7b3;
margin-bottom:4px
}

.percentNumber{
text-align:center;
font-size:20px;
font-weight:700;
color:#ffd66b;
margin-bottom:6px
}

.percentBar{
height:8px;
background:#0c1218;
border-radius:20px;
overflow:hidden;
margin-bottom:8px
}

.percentFill{
height:100%;
background:linear-gradient(90deg,#00ff00,#00aa00);
width:0%;
transition:.25s;
box-shadow:0 0 6px rgba(0,255,0,0.6);
}

input[type=range]{
-webkit-appearance:none;
width:100%;
height:6px;
border-radius:20px;
background:#0c1218;
outline:none
}

input[type=range]::-webkit-slider-thumb{
-webkit-appearance:none;
height:14px;
width:14px;
border-radius:50%;
background:#00e0ff;
cursor:pointer;
box-shadow:0 0 6px #00e0ff;
transition:0.2s
}

input[type=range]::-webkit-slider-thumb:hover{
transform:scale(1.2)
}

/* buttons */

.selectorGrid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
margin-bottom:15px
}

.selectorBtn{
background:#0e1319;
padding:10px;
border-radius:6px;
text-align:center;
cursor:pointer;
border:1px solid rgba(255,255,255,0.1);
font-size:12px;
transition:all 0.2s;
}

.selectorBtn:hover{
transform:scale(1.05);
border-color:#00e0ff;
}

.selectorBtn.active{
font-weight:600;
box-shadow:0 0 6px #00e0ffaa;
}

/* diferenciação das calculadoras */

.card:first-child .selectorBtn.voc.active{
background:#00e0ff33;
color:#00e0ff;
}

.card:first-child .selectorBtn.skill.active{
background:#6a9cff33;
color:#6a9cff;
}

.card:last-child .selectorBtn.voc.active{
background:#ffb54733;
color:#ffb547;
}

.card:last-child .selectorBtn.skill.active{
background:#ff6f6f33;
color:#ff6f6f;
}

/* loyalty */

.loyaltyButtons{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:12px
}

.loyaltyBtn{
flex:1;
padding:6px;
background:#0e1319;
border:1px solid rgba(255,255,255,0.1);
border-radius:4px;
cursor:pointer;
text-align:center;
font-size:11px;
transition:.2s
}

.loyaltyBtn:hover{
transform:scale(1.05);
border-color:#00e0ff;
}

.loyaltyBtn.active{
background:#00e0ff33;
border-color:#00e0ff;
box-shadow:0 0 6px #00e0ffaa;
}

.checkboxGroup{
display:flex;
gap:15px;
margin-bottom:12px;
font-size:12px
}

/* result */

.result{
margin-top:15px;
background:#070b11;
border-radius:10px;
padding:12px;
display:grid;
gap:6px;
font-size:13px
}

.result div{
display:flex;
justify-content:space-between
}

.bigValue{
font-size:20px;
font-weight:700;
color:#ffd66b
}

/* barras */

.progressWrap{
margin-top:10px;
height:12px;
background:#0c1218;
border-radius:20px;
overflow:hidden;
box-shadow:inset 0 0 5px rgba(0,0,0,0.7);
}

.progressBar{
height:100%;
background:linear-gradient(90deg,#00ff00,#00aa00);
width:0%;
transition:width 0.3s;
box-shadow:0 0 6px rgba(0,255,0,0.6);
}

/* varinhas */

.varinhaRow{
display:flex;
gap:10px;
justify-content:center;
margin-bottom:15px;
flex-wrap:wrap;
}

.varinhaRow .field{
flex:1;
min-width:80px;
}

.varinhaRow input{
border:2px solid rgba(255,255,255,0.2);
background:rgba(14,19,25,0.95);
font-weight:700;
font-size:14px;
padding:8px;
transition: all 0.2s;
}

.varinhaRow input:hover{
transform:scale(1.05);
border-color:#00e0ff;
}

.varinhaRow input:focus{
outline:none;
border-color:#00e0ff;
box-shadow:0 0 10px #00e0ff55;
background:rgba(14,19,25,1);
}
/* barra da segunda calculadora */

.progressContainer{
display:flex;
align-items:center;
gap:8px;
margin-top:12px;
margin-bottom:10px;
}

.progressContainer span{
font-size:12px;
color:#9aa7b3;
min-width:28px;
text-align:center;
}

.progressWrap{
flex:1;
height:12px;
background:#0c1218;
border-radius:20px;
overflow:hidden;
box-shadow:inset 0 0 5px rgba(0,0,0,0.7);
}

.progressBar{
height:100%;
background:linear-gradient(90deg,#00ff00,#00aa00);
width:0%;
transition:width 0.3s;
box-shadow:0 0 6px rgba(0,255,0,0.6);
}
/* ================================
   INPUTS IMPORTANTES (Skill atual)
================================ */

#current,
#current2{
background:linear-gradient(145deg,#101720,#0b1118);
border:2px solid #00e0ff55;
font-weight:700;
font-size:16px;
color:#00e0ff;
box-shadow:0 0 8px rgba(0,224,255,0.2);
}

#current:focus,
#current2:focus{
border-color:#00e0ff;
box-shadow:0 0 14px rgba(0,224,255,0.7);
transform:scale(1.03);
}


/* ================================
   INPUTS GERAIS MAIS BONITOS
================================ */

input, select{
background:linear-gradient(145deg,#0f1620,#0a0f15);
border:1px solid rgba(255,255,255,0.15);
}

input:hover, select:hover{
border-color:#00e0ff55;
}


/* ================================
   BOTÕES SEGUNDA CALCULADORA
   (Vocação e Skill)
================================ */

#voc2Buttons .selectorBtn,
#skill2Buttons .selectorBtn{

background:linear-gradient(145deg,#101720,#0b1118);
border:1px solid rgba(255,255,255,0.15);
font-weight:600;
transition:all .2s ease;
}

#voc2Buttons .selectorBtn:hover,
#skill2Buttons .selectorBtn:hover{

transform:translateY(-2px) scale(1.05);
border-color:#00e0ff;
box-shadow:0 0 10px rgba(0,224,255,0.35);
}


/* ================================
   BOTÕES ATIVOS (SEGUNDA CALC)
================================ */

#voc2Buttons .selectorBtn.active{
background:linear-gradient(145deg,#ffb54733,#ff8a0033);
color:#ffb547;
border-color:#ffb547;
box-shadow:0 0 10px rgba(255,181,71,0.6);
}

#skill2Buttons .selectorBtn.active{
background:linear-gradient(145deg,#ff6f6f33,#ff3a3a33);
color:#ff6f6f;
border-color:#ff6f6f;
box-shadow:0 0 10px rgba(255,111,111,0.6);
}


/* ================================
   INPUTS DE VARINHA MAIS VISÍVEIS
================================ */

.varinhaRow input{

background:linear-gradient(145deg,#121a24,#0b1118);
border:2px solid rgba(255,255,255,0.15);
font-weight:700;
font-size:15px;
}

.varinhaRow input:hover{
border-color:#00e0ff;
box-shadow:0 0 10px rgba(0,224,255,0.35);
}

.varinhaRow input:focus{
border-color:#00e0ff;
box-shadow:0 0 12px rgba(0,224,255,0.7);
transform:scale(1.05);
}
/* =====================================
   PRIMEIRA CALCULADORA - VISUAL MELHOR
===================================== */

/* Skill atual mais destacado */

#current{
background:linear-gradient(145deg,#101720,#0b1118);
border:2px solid #00e0ff55;
font-weight:700;
font-size:16px;
color:#00e0ff;
box-shadow:0 0 8px rgba(0,224,255,0.25);
}

#current:focus{
border-color:#00e0ff;
box-shadow:0 0 14px rgba(0,224,255,0.7);
transform:scale(1.03);
}


/* =============================
   BOTÕES VOCAÇÃO (calc 1)
============================= */

.card:first-child .selectorBtn.voc{

background:linear-gradient(145deg,#101720,#0b1118);
border:1px solid rgba(255,255,255,0.15);
font-weight:600;
transition:all .2s ease;
}

.card:first-child .selectorBtn.voc:hover{

transform:translateY(-2px) scale(1.05);
border-color:#00e0ff;
box-shadow:0 0 10px rgba(0,224,255,0.35);
}

.card:first-child .selectorBtn.voc.active{

background:linear-gradient(145deg,#00e0ff33,#0099ff33);
color:#00e0ff;
border-color:#00e0ff;
box-shadow:0 0 12px rgba(0,224,255,0.6);
}


/* =============================
   BOTÕES SKILL (calc 1)
============================= */

.card:first-child .selectorBtn.skill{

background:linear-gradient(145deg,#101720,#0b1118);
border:1px solid rgba(255,255,255,0.15);
font-weight:600;
transition:all .2s ease;
}

.card:first-child .selectorBtn.skill:hover{

transform:translateY(-2px) scale(1.05);
border-color:#6a9cff;
box-shadow:0 0 10px rgba(106,156,255,0.4);
}

.card:first-child .selectorBtn.skill.active{

background:linear-gradient(145deg,#6a9cff33,#4c7eff33);
color:#6a9cff;
border-color:#6a9cff;
box-shadow:0 0 12px rgba(106,156,255,0.6);
}
/* =====================================
   DESTAQUE CAMPOS IMPORTANTES
===================================== */

/* Skill alvo - primeira calculadora */

#target{
background:linear-gradient(145deg,#101720,#0b1118);
border:2px solid #6a9cff55;
font-weight:700;
font-size:16px;
color:#6a9cff;
box-shadow:0 0 8px rgba(106,156,255,0.25);
}

#target:focus{
border-color:#6a9cff;
box-shadow:0 0 14px rgba(106,156,255,0.7);
transform:scale(1.03);
}


/* % restante - segunda calculadora */

#percent2{
background:linear-gradient(145deg,#101720,#0b1118);
border:2px solid #00ff8855;
font-weight:700;
font-size:16px;
color:#00ff88;
box-shadow:0 0 8px rgba(0,255,136,0.25);
}

#percent2:focus{
border-color:#00ff88;
box-shadow:0 0 14px rgba(0,255,136,0.7);
transform:scale(1.03);
}
/* =====================================
   EFEITO DE FOCO GLOBAL NOS INPUTS
===================================== */

input{
transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
}

input:hover{
transform:scale(1.02);
}

input:focus{
transform:scale(1.04);
box-shadow:0 0 12px rgba(0,224,255,0.45);
border-color:#00e0ff;
z-index:2;
position:relative;
}
/* =====================================
   MICRO INTERAÇÃO INPUTS
   (cada calculadora com cor própria)
===================================== */

input{
transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
}

/* hover geral */

input:hover{
transform:scale(1.02);
}


/* =============================
   CALCULADORA 1 (AZUL)
============================= */

.card:first-child input:focus{

transform:scale(1.04);
border-color:#00e0ff;
box-shadow:0 0 12px rgba(0,224,255,0.45);
z-index:2;
position:relative;

}


/* =============================
   CALCULADORA 2 (LARANJA)
============================= */

.card:last-child input:focus{

transform:scale(1.04);
border-color:#ff8a00;
box-shadow:0 0 12px rgba(255,138,0,0.45);
z-index:2;
position:relative;

}
/* ================================
INPUTS DESTACADOS
================================ */

/* primeira calculadora (azul) */

.card:first-of-type input:hover{
transform:scale(1.03);
}

.card:first-of-type input:focus{

transform:scale(1.05);

border:2px solid #00e0ff;

box-shadow:
0 0 6px rgba(0,224,255,0.6),
0 0 14px rgba(0,224,255,0.4);

background:#0b1620;

}


/* segunda calculadora (laranja) */

.card:last-of-type input:hover{
transform:scale(1.03);
}

.card:last-of-type input:focus{

transform:scale(1.05);

border:2px solid #ff8a00;

box-shadow:
0 0 6px rgba(255,138,0,0.7),
0 0 14px rgba(255,138,0,0.45);

background:#1a1208;

}


/* ================================
BARRA DE SKILL ESTILO TIBIA
================================ */

.progressBar,
.percentFill{

background:linear-gradient(
90deg,
#00ff00 0%,
#00cc00 40%,
#33ff33 50%,
#00cc00 60%,
#00aa00 100%
);

background-size:200% 100%;

animation:skillGlow 3s linear infinite;

box-shadow:
0 0 6px rgba(0,255,0,0.7),
inset 0 0 6px rgba(0,0,0,0.5);

}


/* animação de brilho passando */

@keyframes skillGlow{

0%{
background-position:0% 0;
}

100%{
background-position:200% 0;
}

}
/* ================================
   BARRA COM BRILHO BASE
================================ */

.progressBar,
.percentFill{
background:linear-gradient(
90deg,
#00ff00 0%,
#00cc00 40%,
#33ff33 50%,
#00cc00 60%,
#00aa00 100%
);
background-size:200% 100%;
animation:skillFlow 3s linear infinite;
box-shadow:
0 0 6px rgba(0,255,0,0.7),
inset 0 0 6px rgba(0,0,0,0.6);
}


/* movimento do brilho */

@keyframes skillFlow{
0%{background-position:0% 0;}
100%{background-position:200% 0;}
}


/* ================================
   EFEITO LEVEL UP
================================ */

.levelUpFlash{
animation:levelFlash .6s ease;
}

@keyframes levelFlash{

0%{
box-shadow:
0 0 10px #00ff00,
0 0 20px #33ff33;
transform:scaleY(1.2);
}

50%{
box-shadow:
0 0 20px #66ff66,
0 0 35px #00ff00;
}

100%{
box-shadow:
0 0 6px rgba(0,255,0,0.7);
transform:scaleY(1);
}

}
/* ================================
   TEXTO FLUTUANTE DE PROGRESSO
================================ */

.skillFloat{

position:absolute;

top:-18px;
left:50%;

transform:translateX(-50%);

font-size:12px;
font-weight:700;

color:#7CFF7C;

text-shadow:
0 0 6px rgba(0,255,0,0.9),
0 0 12px rgba(0,255,0,0.6);

pointer-events:none;

animation:floatSkill 1.2s ease forwards;

}

@keyframes floatSkill{

0%{
opacity:0;
transform:translate(-50%,5px) scale(.9);
}

20%{
opacity:1;
}

100%{
opacity:0;
transform:translate(-50%,-18px) scale(1.1);
}

}
.progressWrap{
position:relative;
}
/* ===============================
FLOAT DE PROGRESSO
=============================== */

.progressWrap{
position:relative;
}

.skillFloat{

position:absolute;

left:50%;
top:-20px;

transform:translateX(-50%);

font-size:12px;
font-weight:700;

color:#7CFF7C;

text-shadow:
0 0 6px rgba(0,255,0,0.9),
0 0 12px rgba(0,255,0,0.6);

pointer-events:none;

animation:floatSkill 1.2s ease forwards;

}

@keyframes floatSkill{

0%{
opacity:0;
transform:translate(-50%,5px) scale(.9);
}

20%{
opacity:1;
}

100%{
opacity:0;
transform:translate(-50%,-18px) scale(1.1);
}

}
/* =================================
   TOGGLES (Dummy / Double Event)
================================= */

.checkboxGroup{
display:flex;
gap:12px;
margin-bottom:14px;
justify-content:center;
}

/* esconde checkbox padrão */

.checkboxGroup input{
display:none;
}

/* botão visual */

.checkboxGroup label{

flex:1;

display:flex;
align-items:center;
justify-content:center;

padding:10px 12px;

background:linear-gradient(145deg,#101720,#0b1118);

border:1px solid rgba(255,255,255,0.15);

border-radius:8px;

cursor:pointer;

font-size:13px;
font-weight:600;

color:#9aa7b3;

transition:all .2s ease;

user-select:none;

}


/* hover */

.checkboxGroup label:hover{

transform:translateY(-2px) scale(1.03);

border-color:#00e0ff;

box-shadow:0 0 8px rgba(0,224,255,0.35);

}


/* ativado */

.checkboxGroup input:checked + span{

color:#00ff88;

}


/* label quando ativo */

.checkboxGroup input:checked + span::before{

content:"✓ ";
color:#00ff88;

}


/* glow quando ativo */

.checkboxGroup input:checked ~ span,
.checkboxGroup input:checked + span{

text-shadow:0 0 6px rgba(0,255,136,0.7);

}

.checkboxGroup input:checked + span{

background:linear-gradient(145deg,#00ff8833,#00994d33);

border-color:#00ff88;

box-shadow:

0 0 10px rgba(0,255,136,0.5),
inset 0 0 8px rgba(0,255,136,0.2);

}
/* ================================
TOGGLE LIMPO COM ÍCONES
================================ */

.checkboxGroup{
display:flex;
gap:22px;
justify-content:center;
margin-bottom:14px;
flex-wrap:wrap;
}

.toggle{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
font-size:13px;
color:#9aa7b3;
user-select:none;
transition:.2s;
}

.toggle input{
display:none;
}

/* trilho */

.toggleTrack{

width:42px;
height:20px;

background:#0c1218;

border-radius:20px;

position:relative;

transition:.25s;

box-shadow:
inset 0 0 4px rgba(0,0,0,0.7);

}

/* bolinha */

.toggleDot{

width:16px;
height:16px;

background:#666;

border-radius:50%;

position:absolute;

top:2px;
left:2px;

transition:.25s;

}

/* hover */

.toggle:hover{
color:#e8edf2;
}

/* ativado */

.toggle input:checked + .toggleTrack{

background:linear-gradient(90deg,#00ff88,#00cc66);

box-shadow:
0 0 8px rgba(0,255,136,0.6);

}

/* mover bolinha */

.toggle input:checked + .toggleTrack .toggleDot{

left:24px;

background:white;

box-shadow:
0 0 6px rgba(255,255,255,0.8);

}

/* texto ativo */

.toggle input:checked ~ .toggleText{

color:#00ff88;

text-shadow:0 0 6px rgba(0,255,136,0.6);

}
/* ===============================
TOGGLE MMO STYLE
=============================== */

.checkboxGroup{
display:flex;
gap:26px;
justify-content:center;
margin-bottom:14px;
flex-wrap:wrap;
}

.toggle{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
font-size:13px;
color:#9aa7b3;
transition:.2s;
user-select:none;
}

.toggle input{
display:none;
}

/* trilho */

.toggleTrack{

width:42px;
height:20px;

background:#0c1218;

border-radius:20px;

position:relative;

transition:.25s;

box-shadow:
inset 0 0 4px rgba(0,0,0,0.7);

}

/* bolinha */

.toggleDot{

width:16px;
height:16px;

background:#666;

border-radius:50%;

position:absolute;

top:2px;
left:2px;

transition:.25s;

}

/* hover */

.toggle:hover .toggleText{
color:#e8edf2;
}

/* ativo */

.toggle input:checked + .toggleTrack{

background:linear-gradient(90deg,#00ff88,#00cc66);

box-shadow:
0 0 8px rgba(0,255,136,0.6);

}

/* mover bolinha */

.toggle input:checked + .toggleTrack .toggleDot{

left:24px;

background:white;

box-shadow:
0 0 6px rgba(255,255,255,0.8);

}

/* texto ativo */

.toggle input:checked ~ .toggleText{

color:#00ff88;

text-shadow:0 0 6px rgba(0,255,136,0.7);

}

/* animação do raio */

.toggleText{
transition:.2s;
}

.toggle input:checked ~ .toggleText::before{

animation:buffPulse 1.4s infinite;

}

@keyframes buffPulse{

0%{filter:brightness(1)}
50%{filter:brightness(1.6)}
100%{filter:brightness(1)}

}
.toggleText{
display:flex;
align-items:center;
gap:6px;
}

.toggleText::before{
content:"";
}
.copyBtn{

margin-top:10px;

width:100%;

padding:10px;

background:linear-gradient(145deg,#00e0ff,#0088ff);

border:none;

border-radius:8px;

color:white;

font-weight:700;

cursor:pointer;

transition:.2s;

}

.copyBtn:hover{

transform:scale(1.05);

box-shadow:0 0 10px rgba(0,224,255,0.7);

}
/* ===============================
TOGGLE SWITCH MMO STYLE
=============================== */

.checkboxGroup{
display:flex;
gap:30px;
justify-content:center;

<body>

<div class="wrapper">
<h1>⚔️ Calculadora skills</h1>

<div class="container">

<!-- Primeira Calculadora -->
<div class="card">
<h2>Calculadora Skill Desejada</h2>
<div class="row">
<div class="field"><label>Skill Atual</label><input id="current" type="number" value="104"></div>

</div>

</div>

<div class="row">

</div>

</div>

<div class="selectorBtn skill2" data-skill="melee">Melee</div>

<div class="selectorBtn skill2" data-skill="magic">Magic</div>
</div>

<div class="field"><label>Regular</label><input id="regular2" type="number" value="0"></div>
<div class="field"><label>Durable</label><input id="durable2" type="number" value="0"></div>
<div class="field"><label>Lasting</label><input id="lasting2" type="number" value="0"></div>
</div>

<div class="loyaltyButtons" id="loyaltyButtons2"></div>

<label class="toggle">
<input type="checkbox" id="dummy2">
<span class="toggleTrack"><span class="toggleDot"></span></span>
<span class="toggleText">🪵 Training Dummy</span>
</label>

<label class="toggle">
<input type="checkbox" id="double2">
<span class="toggleTrack"><span class="toggleDot"></span></span>
<span class="toggleText">⚡ Double Skill Event</span>
</label>

</div>

<span id="skillLeft2">104</span>

<div class="progressBar" id="bar2"></div>
</div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
    let lastPercent = 0
// BASE & Vocations
const BASE=1600;
const vocation={ knight:{magic:3,melee:1.1,fist:1.1,distance:1.4,shield:1.1},
paladin:{magic:1.4,melee:1.2,fist:1.2,distance:1.1,shield:1.1},
druid:{magic:1.1,melee:1.8,fist:1.5,distance:1.8,shield:1.5},
sorcerer:{magic:1.1,melee:2,fist:1.5,distance:2,shield:1.5},
monk:{magic:1.25,melee:1.4,fist:1.1,distance:1.5,shield:1.15}};
const weaponPoints={regular:300000,durable:1080000,lasting:8640000};
const weaponTime={regular:{duration:1000,cost:347222},durable:{duration:3600,cost:1250000},lasting:{duration:28800,cost:10000000}};
function Z(skill,voc,sk){let i=vocation[voc][sk];return BASE*(Math.pow(i,skill)-1)/(i-1)}
function N(skill,voc,sk){let i=vocation[voc][sk];return BASE*Math.pow(i,skill)}
function formatTime(sec){let h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=Math.floor(sec%60);return (h>0?h+"h ":"")+(m>0?m+"m ":"")+s+"s"}

// Primeira Calculadora
let selectedVoc="knight",loyalty=0


const currentInput=document.getElementById("current"),targetInput=document.getElementById("target")
const skillInput=document.getElementById("skill"),dummyInput=document.getElementById("dummy"),doubleInput=document.getElementById("double")
const result=document.getElementById("result")
const percentSlider=document.getElementById("percent"),percentFill=document.getElementById("percentFill"),percentNumber=document.getElementById("percentNumber")
function updatePercentFill(val){percentFill.style.width=val+"%";percentNumber.innerText=(100-val).toFixed(0)+"% restante"}
percentSlider.oninput=()=>{updatePercentFill(parseFloat(percentSlider.value));calc()}
document.querySelectorAll(".voc").forEach(v=>{v.onclick=()=>{document.querySelectorAll(".voc").forEach(x=>x.classList.remove("active"));v.classList.add("active");selectedVoc=v.dataset.voc;calc()}})
document.querySelectorAll(".skill").forEach(btn=>{btn.onclick=()=>{document.querySelectorAll(".skill").forEach(x=>x.classList.remove("active"));btn.classList.add("active");skillInput.value=btn.dataset.skill;calc()}})
const loyaltyButtons=document.getElementById("loyaltyButtons")
for(let i=0;i<=50;i+=5){let btn=document.createElement("div");btn.className="loyaltyBtn";btn.innerText=i+"%";btn.onclick=()=>{document.querySelectorAll(".loyaltyBtn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");loyalty=i/100;calc()};if(i===0)btn.classList.add("active");loyaltyButtons.appendChild(btn)}
function calc(){
let current=parseInt(currentInput.value),target=parseInt(targetInput.value),percent=parseFloat(percentSlider.value),skill=skillInput.value
let dummy=dummyInput.checked,dbl=doubleInput.checked
let remaining = (100 - percent)/100;  // quanto ainda falta
let pts = (Z(target, selectedVoc, skill) - Z(current, selectedVoc, skill)) * remaining;
pts/=1+loyalty;if(dummy)pts/=1.1;if(dbl)pts/=2
let lasting=Math.floor(pts/weaponPoints.lasting);pts%=weaponPoints.lasting
let durable=Math.floor(pts/weaponPoints.durable);pts%=weaponPoints.durable
let regular=Math.ceil(pts/weaponPoints.regular)
let totalTime=regular*weaponTime.regular.duration+durable*weaponTime.durable.duration+lasting*weaponTime.lasting.duration
let totalCost=regular*weaponTime.regular.cost+durable*weaponTime.durable.cost+lasting*weaponTime.lasting.cost
result.innerHTML=`<div><span>Regular</span><span>${regular}</span></div><div><span>Durable</span><span>${durable}</span></div><div><span>Lasting</span><span>${lasting}</span></div><div><span>Tempo</span><span>${formatTime(totalTime)}</span></div><div><span>Custo</span><span>${totalCost.toLocaleString()} gp</span></div>`


}
function calc() {
    let current = parseInt(currentInput.value),
        target = parseInt(targetInput.value),
        skill = skillInput.value,
        percent = parseFloat(percentSlider.value); // % já completado da skill atual

    let dummy = dummyInput.checked,
        dbl = doubleInput.checked;

    // experiência total até o nível atual + % dentro do nível
    let currentExp = Z(current, selectedVoc, skill) + N(current, selectedVoc, skill) * (percent / 100);
    let targetExp = Z(target, selectedVoc, skill);

    // pontos restantes
    let pts = targetExp - currentExp;

    // aplica modificadores
    pts /= 1 + loyalty;
    if(dummy) pts /= 1.1;
    if(dbl) pts /= 2;

    let lasting = Math.floor(pts / weaponPoints.lasting); pts %= weaponPoints.lasting;
    let durable = Math.floor(pts / weaponPoints.durable); pts %= weaponPoints.durable;
    let regular = Math.ceil(pts / weaponPoints.regular);

    let totalTime = regular * weaponTime.regular.duration + durable * weaponTime.durable.duration + lasting * weaponTime.lasting.duration;
    let totalCost = regular * weaponTime.regular.cost + durable * weaponTime.durable.cost + lasting * weaponTime.lasting.cost;

    result.innerHTML = `<div><span>Regular</span><span>${regular}</span></div>
                        <div><span>Durable</span><span>${durable}</span></div>
                        <div><span>Lasting</span><span>${lasting}</span></div>
                        <div><span>Tempo</span><span>${formatTime(totalTime)}</span></div>
                        <div><span>Custo</span><span>${totalCost.toLocaleString()} gp</span></div>`;
}

// Segunda Calculadora atualizada
let selectedVoc2="knight",selectedSkill2="melee"
const current2=document.getElementById("current2"),percent2Input=document.getElementById("percent2")
const regular2=document.getElementById("regular2"),durable2=document.getElementById("durable2"),lasting2=document.getElementById("lasting2")
const dummy2=document.getElementById("dummy2"),double2=document.getElementById("double2")
const result2=document.getElementById("result2"),bar2=document.getElementById("bar2")

document.querySelectorAll(".voc2").forEach(v=>{v.onclick=()=>{document.querySelectorAll(".voc2").forEach(x=>x.classList.remove("active"));v.classList.add("active");selectedVoc2=v.dataset.voc;calcReach()}})
document.querySelectorAll(".skill2").forEach(btn=>{btn.onclick=()=>{document.querySelectorAll(".skill2").forEach(x=>x.classList.remove("active"));btn.classList.add("active");selectedSkill2=btn.dataset.skill;calcReach()}})

const loyaltyButtons2=document.getElementById("loyaltyButtons2")
for(let i=0;i<=50;i+=5){let btn=document.createElement("div");btn.className="loyaltyBtn";btn.innerText=i+"%";btn.onclick=()=>{document.querySelectorAll("#loyaltyButtons2 .loyaltyBtn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");calcReach()};if(i===0)btn.classList.add("active");loyaltyButtons2.appendChild(btn)}

function calcReach(){
    let skill=parseInt(current2.value),percent=parseFloat(percent2Input.value)

    let loyalty=parseFloat(document.querySelector("#loyaltyButtons2 .active").innerText)/100
    let reg=parseInt(regular2.value)||0, dur=parseInt(durable2.value)||0, last=parseInt(lasting2.value)||0
    let dummyChk=dummy2.checked, dblChk=double2.checked
    let pts=reg*weaponPoints.regular+dur*weaponPoints.durable+last*weaponPoints.lasting
    pts*=(1+loyalty); if(dummyChk) pts*=1.1; if(dblChk) pts*=2

    let startSkillExp=Z(skill,selectedVoc2,selectedSkill2)
    let nextSkillExp=N(skill,selectedVoc2,selectedSkill2)
    let totalExp=startSkillExp + nextSkillExp*(1-percent/100) + pts

    let newSkill=skill
    let remainingPercent=0
    while(Z(newSkill+1,selectedVoc2,selectedSkill2) <= totalExp){newSkill++}
    let currentSkillExp=Z(newSkill,selectedVoc2,selectedSkill2)
    let nextSkillExpCurrent=N(newSkill,selectedVoc2,selectedSkill2)
    let percentInSkill=((totalExp-currentSkillExp)/nextSkillExpCurrent)*100
    remainingPercent=100-percentInSkill

    let gained=newSkill-skill
    let message=""

    if(reg+dur+last>0){
        message+="<strong>Varinhas usadas:</strong> "
        if(reg>0) message+=`<span style="color:#ffd66b">${reg} Regular</span> `
        if(dur>0) message+=`<span style="color:#ff8a00">${dur} Durable</span> `
        if(last>0) message+=`<span style="color:#ff5e5e">${last} Lasting</span> `
        message+="<br>"
    }

    if(gained>0){
        message+=`<span>Você ganhou <strong>${gained} skill(s)</strong> | Faltam: <strong>${remainingPercent.toFixed(2)}%</strong> para skill <strong>${newSkill+1}</strong></span>`
        bar2.style.width=percentInSkill+"%"
    } else {
        message+=`<span>Você ganhou <strong>${(percentInSkill-(100-percent)).toFixed(2)}%</strong> dentro da skill <strong>${skill}</strong> | Faltam: <strong>${remainingPercent.toFixed(2)}%</strong> para skill <strong>${skill+1}</strong></span>`
        bar2.style.width=percentInSkill+"%"
        let diff = percentInSkill - lastPercent

if(diff > 0.05){

let float = document.createElement("div")
float.className = "skillFloat"
float.innerText = "+" + diff.toFixed(2) + "%"

bar2.parentElement.appendChild(float)

setTimeout(()=>float.remove(),1200)

}

lastPercent = percentInSkill


    }
document.getElementById("skillLeft2").innerText = newSkill
document.getElementById("skillRight2").innerText = newSkill + 1
    result2.innerHTML=message
}

// Atualização ao digitar
document.querySelectorAll("input").forEach(el=>{
    el.addEventListener("input",()=>{updatePercentFill(parseFloat(document.getElementById("percent").value)); calc(); calcReach();})
})

updatePercentFill(0)
calc()
calcReach()
});
    
</script>
