<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Global Exercise Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
    font-family: 'Roboto', Arial, sans-serif;
    margin:0;
    padding:40px 20px;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
}

.wrapper{
    max-width: 1350px;
    margin: auto;
}

h1{
    text-align:center;
    font-size:42px;
    margin-bottom:50px;
    background: linear-gradient(90deg,#00e0ff,#4facfe);
    -webkit-background-clip: text;
    color: transparent;
    letter-spacing: 1px;
}

.container{
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
}

.card{
    background: rgba(0,0,0,0.7);
    padding: 35px 25px;
    border-radius: 25px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    flex: 1 1 450px;
    min-width: 380px;
    transition: transform 0.3s, box-shadow 0.3s;
}

.card:hover{
    transform: translateY(-10px);
    box-shadow: 0 35px 80px rgba(0,0,0,0.85);
}

.card h2{
    text-align: center;
    font-size: 26px;
    margin-bottom: 30px;
    background: linear-gradient(90deg,#ff9a9e,#fad0c4);
    -webkit-background-clip: text;
    color: transparent;
}

.row{
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 18px;
}

.field{
    flex:1;
    min-width:100px;
    display:flex;
    flex-direction:column;
}

label{
    font-size:14px;
    margin-bottom:4px;
    color:#ccc;
}

input, select{
    padding: 12px 15px;
    border-radius: 12px;
    border: none;
    background: #2c2c2c;
    color: white;
    font-size: 14px;
    outline: none;
    transition: 0.2s;
}

input::placeholder{
    color: #aaa;
    font-weight: 500;
}

input:focus, select:focus{
    background: #3a3a3a;
    box-shadow: 0 0 12px #ff9a9e;
}

.checkboxGroup{
    display:flex;
    gap:20px;
    margin-bottom:15px;
    align-items:center;
}

.checkboxGroup label{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:14px;
    color:#ccc;
}

.result{
    margin-top: 25px;
    padding: 22px;
    border-radius: 20px;
    background: linear-gradient(145deg,#0a0f18,#05070c);
    border: 1px solid rgba(255,255,255,0.05);
    box-shadow: inset 0 0 12px rgba(0,0,0,0.9),0 0 25px rgba(255,255,255,0.1);
    font-size: 16px;
    line-height: 1.8;
}

.result div{
    margin-bottom:10px;
}

.bigValue{
    font-size: 24px;
    color: #ffcb6b;
    font-weight: 700;
}

.progressWrap{
    margin-top:12px;
    background:#0b1118;
    border-radius:14px;
    overflow:hidden;
    height:16px;
    box-shadow:inset 0 0 8px rgba(0,0,0,.8);
}

.progressBar{
    height:100%;
    background:linear-gradient(90deg,#ff9a9e,#fad0c4);
    width:0%;
    transition: width 0.4s;
}

.icon{
    margin-right:6px;
}

@media(max-width:1000px){
    .container{
        flex-direction: column;
        gap: 25px;
    }
}
</style>
</head>
<body>

<div class="wrapper">
<h1>⚔️ Global Exercise Calculator</h1>

<div class="container">

<!-- CARD 1 -->
<div class="card">
<h2>🧮 Exercise Weapon</h2>

<div class="row">
<div class="field">
    <label for="current">Skill Atual</label>
    <input id="current" type="number" value="104" placeholder="Ex: 104">
</div>
<div class="field">
    <label for="target">Skill Alvo</label>
    <input id="target" type="number" value="105" placeholder="Ex: 105">
</div>
<div class="field">
    <label for="percent">% Restante</label>
    <input id="percent" type="number" value="100" placeholder="Ex: 100">
</div>
</div>

<div class="row">
<div class="field">
    <label for="vocation">Vocação</label>
    <select id="vocation">
        <option value="monk">Monk</option>
        <option value="knight">Knight</option>
        <option value="paladin">Paladin</option>
        <option value="druid">Druid</option>
        <option value="sorcerer">Sorcerer</option>
    </select>
</div>
<div class="field">
    <label for="skill">Tipo de Skill</label>
    <select id="skill">
        <option value="fist">Fist</option>
        <option value="melee">Melee</option>
        <option value="distance">Distance</option>
        <option value="shield">Shield</option>
        <option value="magic">Magic</option>
    </select>
</div>
</div>

<div class="checkboxGroup">
<label><span class="icon">🪑</span><input type="checkbox" id="dummy"> Training Dummy</label>
<label><span class="icon">⚡</span><input type="checkbox" id="double"> Double Skill Event</label>
</div>

<div class="result" id="result"></div>
</div>

<!-- CARD 2 -->
<div class="card">
<h2>✨ Varinhas</h2>

<div class="row">
<div class="field">
    <label for="current2">Skill Atual</label>
    <input id="current2" type="number" value="104" placeholder="Ex: 104">
</div>
<div class="field">
    <label for="percent2">% Restante</label>
    <input id="percent2" type="number" value="100" placeholder="Ex: 100">
</div>
</div>

<div class="row">
<div class="field">
    <label for="regular2">Exercise Regular</label>
    <input id="regular2" type="number" value="0" placeholder="Ex: 0">
</div>
<div class="field">
    <label for="durable2">Exercise Durable</label>
    <input id="durable2" type="number" value="0" placeholder="Ex: 0">
</div>
<div class="field">
    <label for="lasting2">Exercise Lasting</label>
    <input id="lasting2" type="number" value="0" placeholder="Ex: 0">
</div>
</div>

<div class="row">
<div class="field">
    <label for="vocation2">Vocação</label>
    <select id="vocation2">
        <option value="monk">Monk</option>
        <option value="knight">Knight</option>
        <option value="paladin">Paladin</option>
        <option value="druid">Druid</option>
        <option value="sorcerer">Sorcerer</option>
    </select>
</div>
<div class="field">
    <label for="skill2">Tipo de Skill</label>
    <select id="skill2">
        <option value="fist">Fist</option>
        <option value="melee">Melee</option>
        <option value="distance">Distance</option>
        <option value="shield">Shield</option>
        <option value="magic">Magic</option>
    </select>
</div>
</div>

<div class="checkboxGroup">
<label><span class="icon">🪑</span><input type="checkbox" id="dummy2"> Training Dummy</label>
<label><span class="icon">⚡</span><input type="checkbox" id="double2"> Double Skill Event</label>
</div>

<div class="result" id="result2"></div>
<div class="progressWrap"><div class="progressBar" id="bar2"></div></div>
</div>

</div>
</div>

<script>
// JS CORRIGIDO (mesmo que o original, só arrumei N())
const vocation = {
    knight:{magic:3,melee:1.1,fist:1.1,distance:1.4,shield:1.1},
    paladin:{magic:1.4,melee:1.2,fist:1.2,distance:1.1,shield:1.1},
    druid:{magic:1.1,melee:1.8,fist:1.5,distance:1.8,shield:1.5},
    sorcerer:{magic:1.1,melee:2,fist:1.5,distance:2,shield:1.5},
    monk:{magic:1.25,melee:1.4,fist:1.1,distance:1.5,shield:1.15}
};

const weaponPoints = {regular:300000,durable:1080000,lasting:8640000};
const weaponTime = {regular:{charges:500,duration:1000,cost:347222},durable:{charges:1800,duration:3600,cost:1250000},lasting:{charges:14400,duration:28800,cost:10000000}};
const BASE=1600;

function Z(skillValue,voc,skill){
    let i=vocation[voc][skill];
    return BASE*(Math.pow(i,skillValue)-1)/(i-1);
}

function N(skillValue,voc,skill){
    let i=vocation[voc][skill];
    return BASE*Math.pow(i,skillValue); // CORRIGIDO
}

function pointsNeeded(current,target,percent,voc,skill){
    let start=Z(current,voc,skill);
    let end=Z(target,voc,skill);
    let diff=end-start;
    let p=percent/100;
    if(target-current==1){
        return diff*p;
    } else {
        let next=N(current,voc,skill);
        return diff-next*(1-p);
    }
}

function formatTime(sec){
    let h=Math.floor(sec/3600);
    let m=Math.floor((sec%3600)/60);
    let s=Math.floor(sec%60);
    return `${h>0?h+'h ':''}${m>0?m+'m ':''}${s}s`;
}

function calc(){
    let current=parseInt(document.getElementById("current").value);
    let target=parseInt(document.getElementById("target").value);
    let percent=parseFloat(document.getElementById("percent").value);
    let voc=document.getElementById("vocation").value;
    let skill=document.getElementById("skill").value;
    let dummy=document.getElementById("dummy").checked;
    let dbl=document.getElementById("double").checked;

    let pts=pointsNeeded(current,target,percent,voc,skill);
    if(dummy) pts/=1.1;
    if(dbl) pts/=2;

    let lasting=Math.floor(pts/weaponPoints.lasting);
    pts%=weaponPoints.lasting;
    let durable=Math.floor(pts/weaponPoints.durable);
    pts%=weaponPoints.durable;
    let regular=Math.ceil(pts/weaponPoints.regular);

    let totalTime = regular*weaponTime.regular.duration + durable*weaponTime.durable.duration + lasting*weaponTime.lasting.duration;
    let totalCost = regular*weaponTime.regular.cost + durable*weaponTime.durable.cost + lasting*weaponTime.lasting.cost;

    document.getElementById("result").innerHTML=`
        <div>🗡️ Regular: ${regular}</div>
        <div>🛡️ Durable: ${durable}</div>
        <div>🔥 Lasting: ${lasting}</div>
        <div>⏱️ Tempo estimado: ${formatTime(totalTime)}</div>
        <div>💰 Custo total: ${totalCost.toLocaleString()} gp</div>
    `;
}

function calcReach(){
    let skill=parseInt(document.getElementById("current2").value);
    let percent=parseFloat(document.getElementById("percent2").value);
    let voc=document.getElementById("vocation2").value;
    let sk=document.getElementById("skill2").value;
    let regular=parseInt(document.getElementById("regular2").value);
    let durable=parseInt(document.getElementById("durable2").value);
    let lasting=parseInt(document.getElementById("lasting2").value);
    let dummy=document.getElementById("dummy2").checked;
    let dbl=document.getElementById("double2").checked;

    let points= regular*weaponPoints.regular + durable*weaponPoints.durable + lasting*weaponPoints.lasting;
    if(dummy) points*=1.1;
    if(dbl) points*=2;

    let start=Z(skill,voc,sk);
    let next=N(skill,voc,sk);
    let progress=(100-percent)/100;
    let total=start+next*progress+points;

    let newSkill=skill;
    while(Z(newSkill+1,voc,sk)<=total){
        newSkill++;
    }

    let currentStart=Z(newSkill,voc,sk);
    let nextReq=N(newSkill,voc,sk);
    let newPercent=((total-currentStart)/nextReq)*100;
    let remaining=100-newPercent;
    let gainedSkill=newSkill-skill;

    let totalTime = regular*weaponTime.regular.duration + durable*weaponTime.durable.duration + lasting*weaponTime.lasting.duration;
    let totalCost = regular*weaponTime.regular.cost + durable*weaponTime.durable.cost + lasting*weaponTime.lasting.cost;

    document.getElementById("result2").innerHTML=`
        <div>🎯 Skill final: <span class="bigValue">${newSkill}</span></div>
        <div>📈 Progresso: Você ganhou ${gainedSkill} skill e faltam ${remaining.toFixed(2)}%</div>
        <div>⏱️ Tempo estimado: ${formatTime(totalTime)}</div>
        <div>💰 Custo total: ${totalCost.toLocaleString()} gp</div>
    `;
    document.getElementById("bar2").style.width=newPercent+"%";
}

document.querySelectorAll('input, select').forEach(el=>{
    el.addEventListener('input',()=>{calc(); calcReach();});
});

window.addEventListener('load',()=>{calc(); calcReach();});
</script>

</body>
</html>
